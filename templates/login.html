{% extends "base.html" %}

{% block contenido %}
<h1>Login</h1>

<form method="POST" style="margin-top: 1.5rem; max-width: 400px;">
    {% if error %}
    <p style="color: #f85149; margin-bottom: 1rem;">{{ error }}</p>
    {% endif %}

    <div style="margin-bottom: 1rem;">
        <label style="color: #8b949e; font-size: 0.85rem;">Usuario</label>
        <input type="text" name="username" required
               style="width: 100%; background: #161b22; border: 1px solid #30363d;
                      border-radius: 6px; padding: 0.6rem; color: #c9d1d9;
                      font-family: monospace; margin-top: 0.3rem;">
    </div>

    <div style="margin-bottom: 1.5rem;">
        <label style="color: #8b949e; font-size: 0.85rem;">Contraseña</label>
        <input type="password" name="password" required
               style="width: 100%; background: #161b22; border: 1px solid #30363d;
                      border-radius: 6px; padding: 0.6rem; color: #c9d1d9;
                      font-family: monospace; margin-top: 0.3rem;">
    </div>

    <button type="submit"
            style="background: #238636; border: none; color: white; padding: 0.6rem 1.5rem;
                   border-radius: 6px; font-family: monospace; cursor: pointer;">
        Entrar
    </button>
</form>

{% endblock %}
